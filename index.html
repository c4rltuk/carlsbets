<!DOCTYPE html>  
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Today’s Best Horse Racing Bets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #f5f5f5;
      margin: 0;
      padding: 1.5rem;
    }
    h1 {
      margin-top: 0;
      text-align: center;
    }
    .note {
      font-size: 0.85rem;
      color: #bbb;
      max-width: 800px;
      margin: 0.5rem auto 1.5rem;
      text-align: center;
    }
    table {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      border-collapse: collapse;
      background: #151a2c;
      border-radius: 8px;
      overflow: hidden;
    }
    thead {
      background: #202744;
    }
    th, td {
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      text-align: left;
    }
    th {
      font-weight: 600;
      cursor: pointer;
    }
    tr:nth-child(even) {
      background: #181e33;
    }
    .score {
      font-weight: 600;
    }
    .score.high {
      color: #4ade80;
    }
    .score.mid {
      color: #facc15;
    }
    .score.low {
      color: #fb7185;
    }
    .pill {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: #1f2937;
      color: #e5e7eb;
    }
  </style>
</head>
<body>
  <h1>Today’s Best Horse Racing Bets</h1>
  <p class="note">
    Informational only – not betting advice. Always gamble responsibly.
  </p>

  <table id="bets-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Course</th>
        <th>Horse</th>
        <th>Trainer / Yard</th>
        <th>Form (H / T / Y)</th>
        <th>Score</th>
        <th>Odds</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadBets() {
      try {
        const res = await fetch('bets.json?_=' + Date.now());
        const data = await res.json();

        data.sort((a, b) => b.score - a.score);

        const tbody = document.querySelector('#bets-table tbody');
        tbody.innerHTML = '';

        data.forEach(item => {
          const tr = document.createElement('tr');

          const scoreClass =
            item.score >= 0.75 ? 'high' :
            item.score >= 0.6  ? 'mid'  : 'low';

          tr.innerHTML = `
            <td>${item.race_time}</td>
            <td>${item.course}</td>
            <td><span class="pill">${item.horse}</span></td>
            <td>${item.trainer} <br><span style="font-size:0.8rem;color:#9ca3af;">${item.yard}</span></td>
            <td>${(item.horse_form*100).toFixed(0)}% /
                ${(item.trainer_form*100).toFixed(0)}% /
                ${(item.yard_form*100).toFixed(0)}%</td>
            <td class="score ${scoreClass}">${(item.score*100).toFixed(1)}%</td>
            <td>${item.odds || '-'}</td>
          `;

          tbody.appendChild(tr);
        });
      } catch (err) {
        document.querySelector('#bets-table tbody').innerHTML =
          '<tr><td colspan="7">Could not load bets for today.</td></tr>';
      }
    }

    loadBets();
  </script>
</body>
</html>
