name: Run Bets Script Daily

on:
  schedule:
    - cron: "0 7 * * *"   # Runs every day at 07:00 UK time
  workflow_dispatch:       # Allows manual run

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run bets.py
        env:
          API_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python bets.py

      - name: Commit updated bets.json
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add bets.json
          git commit -m "Updated bets.json" || echo "No changes to commit"
          git push
